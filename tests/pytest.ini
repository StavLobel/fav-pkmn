[pytest]
markers =
    fr1: FR-1 Daily matchup generation
    fr2: FR-2 Same matchup for all users
    fr3: FR-3 Store matchup with date
    fr4: FR-4 Prevent duplicate matchup per date
    fr5: FR-5 Three unique Pokemon per matchup
    fr6: FR-6 Retrieve Pokemon metadata from PokeAPI
    fr7: FR-7 Cache Pokemon metadata locally
    fr8: FR-8 Display current daily matchup
    fr9: FR-9 Display Pokemon name, sprite, types
    fr10: FR-10 Present Pokemon as selectable options
    fr11: FR-11 Indicate whether user has voted
    fr12: FR-12 Select one Pokemon
    fr13: FR-13 Submit vote to backend
    fr14: FR-14 Validate Pokemon belongs to matchup
    fr15: FR-15 One vote per browser per matchup
    fr16: FR-16 Store votes in database
    fr17: FR-17 Associate vote with matchup, pokemon, token, timestamp
    fr18: FR-18 Reject duplicate vote
    fr19: FR-19 Generate anonymous voter token
    fr20: FR-20 Store token in cookie
    fr21: FR-21 Include token when voting
    fr22: FR-22 Enforce uniqueness via matchup_id + voter_token
    fr23: FR-23 Display results after voting
    fr24: FR-24 Display vote counts, percentages, total
    fr25: FR-25 Highlight user's pick
    fr26: FR-26 Indicate winner
    fr27: FR-27 Handle ties
    fr28: FR-28 Show results on revisit
    fr29: FR-29 Reset challenge per calendar day
    fr30: FR-30 Unlock new matchup after reset
    fr31: FR-31 Use configured timezone for reset
    fr32: FR-32 Allow participation after reset
    fr33: FR-33 Store historical matchups
    fr34: FR-34 Allow retrieval of past matchups
    fr35: FR-35 Display winning Pokemon for past days
    nfr_perf: Non-functional performance tests
    nfr_compat: Non-functional compatibility tests
