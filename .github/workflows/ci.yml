name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install ruff

      - name: Check formatting
        run: ruff format --check backend/

      - name: Check linting rules
        run: ruff check backend/

  lint-dart:
    name: Lint Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze Flutter code
        run: |
          docker build --target dev -t fav-pkmn-app ./frontend
          docker run --rm fav-pkmn-app flutter analyze --no-fatal-infos

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev images
        run: docker compose build

      - name: Build CI images
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml build

      - name: Build prod images
        run: docker compose -f docker-compose.prod.yml build

  test-frontend:
    name: Frontend Widget Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Flutter widget tests
        run: docker compose --profile test run --rm test-unit

  test-sanity:
    name: Sanity Gate
    needs: build
    uses: ./.github/workflows/test-suites.yml
    with:
      run-sanity: true

  test-api-security:
    name: API & Security
    needs: test-sanity
    uses: ./.github/workflows/test-suites.yml
    with:
      run-api: true
      run-security: true

  test-e2e:
    name: E2E Browser Tests
    needs: test-api-security
    uses: ./.github/workflows/test-suites.yml
    with:
      run-e2e: true
