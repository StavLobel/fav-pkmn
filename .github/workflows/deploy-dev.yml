name: Deploy to Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [develop]

jobs:
  deploy:
    name: Deploy Dev Environment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.cursor' \
            --exclude '__pycache__' \
            --exclude '.dart_tool' \
            --exclude 'build' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/fav-pkmn/

      - name: Build and start containers
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ~/fav-pkmn && docker compose -f docker-compose.dev-remote.yml up --build -d"

  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Wait for services to stabilize
        run: sleep 20

      - name: Check API health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:8000/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "API health check failed with status $STATUS"
            exit 1
          fi
          echo "API health check passed"

      - name: Check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.VPS_HOST }}:5173)
          if [ "$STATUS" != "200" ]; then
            echo "Frontend health check failed with status $STATUS"
            exit 1
          fi
          echo "Frontend health check passed"

  sanity-check:
    name: Post-deploy Sanity
    needs: deploy
    uses: ./.github/workflows/test-suites.yml
    with:
      run-sanity: true
