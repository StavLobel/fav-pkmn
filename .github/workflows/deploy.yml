name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Build type to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - prod

env:
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'prod' }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files to VPS
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.cursor' \
            --exclude '__pycache__' \
            --exclude '.dart_tool' \
            --exclude 'build' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/fav-pkmn/

      - name: Build and start containers
        run: |
          if [ "$DEPLOY_ENV" = "dev" ]; then
            COMPOSE_FILE="docker-compose.dev-remote.yml"
          else
            COMPOSE_FILE="docker-compose.prod.yml"
          fi
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ~/fav-pkmn && docker compose -f $COMPOSE_FILE up --build -d"
